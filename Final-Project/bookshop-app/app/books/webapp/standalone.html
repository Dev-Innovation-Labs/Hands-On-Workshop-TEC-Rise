<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TEC Rise Bookshop — Books</title>

    <script id="sap-ui-bootstrap"
        src="https://ui5.sap.com/resources/sap-ui-core.js"
        data-sap-ui-libs="sap.m,sap.fe.templates"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="allow"
        data-sap-ui-resourceroots='{"com.tecrise.bookshop.books": "./"}'>
    </script>

    <script>
        sap.ui.getCore().attachInit(function () {
            new sap.m.Shell({
                app: new sap.ui.core.ComponentContainer({
                    name : "com.tecrise.bookshop.books",
                    settings : {
                        id : "com.tecrise.bookshop.books"
                    },
                    async: true
                })
            }).placeAt("content");
        });
    </script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content"></body>
</html>
