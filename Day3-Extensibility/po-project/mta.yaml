_schema-version: '3.1'
ID: po-project
version: 1.0.0
description: PO Request Side-by-Side Extension — Clean Core (Day 3 TEC Rise)

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npx cds build --production

modules:

  # --- Server Module (Node.js CAP) ---
  - name: po-project-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      readiness-health-check-type: http
      readiness-health-check-http-endpoint: /health
    build-parameters:
      builder: npm
    requires:
      - name: po-project-db
      - name: po-project-auth
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # --- DB Deployer (HANA HDI Container) ---
  - name: po-project-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: po-project-db

  # --- App Router (Fiori Hosting) ---
  - name: po-project-app
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: po-project-auth

resources:

  # --- HANA Cloud HDI Container ---
  - name: po-project-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # --- XSUAA Authentication ---
  - name: po-project-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: po-project-${org}-${space}
        tenant-mode: dedicated
